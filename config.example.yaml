# briarWM configuration — ~/.config/briarWM/config.yaml
# Reloads automatically on save (also: mod+shift+c).

# What `mod` (or `$mod`) means in the keybindings below: alt (recommended) | cmd |
# ctrl | shift | hyper. Alt = i3's default. Change it here and every mod+ binding
# follows. Note: bound Alt combos won't type special characters.
modifier: alt

gaps:
  inner: 10           # between windows
  outer: 6            # screen margin

# Visual focus cue: a soft glowing border that gives one quick bounce around the focused
# window on each focus switch. Purely cosmetic — never moves windows or affects tiling.
focus_indicator:
  enabled: true
  color: "#64D2FF"      # border accent — #RGB, #RRGGBB, or #RRGGBBAA (macOS systemTeal)
  border_width: 1.5     # stroke width of the border
  corner_radius: 6.0    # rounding of the border corners
  fade_in: 0.14         # border rise time, seconds (smooth swell)
  hold: 0.0             # peak plateau; 0 = swell straight into the fade
  fade_out: 0.20        # border fall time, seconds (soft trailing fade)
  opacity: 0.60         # peak opacity, 0–1 — lower is more subtle
  rest_opacity: 0.3     # resting opacity between pulses, 0–1 — 0 = border only shows during
                        # the pulse; >0 = a persistent border that pulses brighter on switch
  glow: 5.0             # soft same-color feather in points (0 = a crisp hard line)

# Transient bezel that flashes a mode change (float, zoom, split, workspace float, binding
# mode) at the lower center of the focused window's display, then fades out — like the
# macOS volume bezel. `enabled` gates the bezel only; the menu-bar suffix always shows
# sticky states (⛶ zoomed, ~ floating, ≈ desktop floating).
# hud:
#   enabled: true
#   fade_in: 0.12         # bezel rise time, seconds
#   hold: 1.0             # how long it stays fully visible before fading
#   fade_out: 0.35        # bezel fall time, seconds
#   bottom_offset: 120    # points above the display's bottom edge
#   font_size: 13         # label point size

layout:
  default_ratio: 0.5        # new split's share for the existing window (0–1)
  insert_at: after          # where a new window lands relative to the focused one
  auto_split: longer_edge   # longer_edge | horizontal | vertical
  focus_wraps_monitors: true
  move_follows_focus: false   # `move workspace N`: follow the window to that desktop?
  new_window_follows_focus: true # a new window opens on the focused desktop (i3-style), even
                              # if macOS placed it on another display; false = tile it where
                              # it appeared
  space_poll_interval: 1.5    # seconds; backstop sweep for drag-to-desktop. 0 disables.
                              # (takes effect on restart, not hot reload)
  manage_tabbed_windows: true # treat native macOS tabs (e.g. Ghostty) as one tile that
                              # follows the visible tab; false = one tile per tab window
  reflow_on_minimize: true    # minimizing a window reflows the rest to fill the space
                              # (restored on un-minimize); false leaves its slot empty
  # `cycle layout` steps through these presets, in order, wrapping around.
  # Presets: even-horizontal | even-vertical | main-vertical | main-horizontal | tiled
  preset_cycle: [even-horizontal, even-vertical, main-vertical, main-horizontal, tiled]
  main_ratio: 0.6             # main pane's screen fraction in the main-* presets

# Named commands for `exec`. Change these to your terminal / launcher.
exec:
  terminal: "open -a Terminal"
  launcher: "open -a Spotlight"

keybindings:
  # focus (vim h/j/k/l + arrows)
  "mod+h": "focus left"
  "mod+j": "focus down"
  "mod+k": "focus up"
  "mod+l": "focus right"
  "mod+left": "focus left"
  "mod+down": "focus down"
  "mod+up": "focus up"
  "mod+right": "focus right"

  # move / swap window
  "mod+shift+h": "move left"
  "mod+shift+j": "move down"
  "mod+shift+k": "move up"
  "mod+shift+l": "move right"

  # split preselection (bspwm-style) for the next window
  "mod+ctrl+h": "preselect horizontal"
  "mod+ctrl+v": "preselect vertical"
  "mod+e": "toggle split"

  # snap the whole desktop to the next preset layout (tmux Ctrl-b Space style);
  # order & main-pane width come from layout.preset_cycle / layout.main_ratio above
  "mod+t": "cycle layout"
  # or jump straight to one preset:
  # "mod+ctrl+t": "layout tiled"
  # "mod+ctrl+m": "layout main-vertical"

  # sizing — expands the focused window toward the named direction
  # (or shrinks it if that side is flush against the screen edge)
  "mod+ctrl+left": "resize left 40"
  "mod+ctrl+right": "resize right 40"
  "mod+ctrl+up": "resize up 40"
  "mod+ctrl+down": "resize down 40"
  "mod+shift+e": "balance"
  "mod+r": "mode resize"

  # window / layout
  "mod+f": "fullscreen"
  "mod+shift+space": "toggle float"
  "mod+ctrl+space": "toggle workspace float"   # float the whole desktop; again = snap back
  "mod+space": "focus mode toggle"
  "mod+shift+q": "close"

  # desktops (macOS Spaces): switch to N, or send the focused window to N.
  # N is 1-based, left → right, among the user desktops of the focused display.
  "mod+1": "workspace 1"
  "mod+2": "workspace 2"
  "mod+3": "workspace 3"
  "mod+4": "workspace 4"
  "mod+5": "workspace 5"
  "mod+shift+1": "move workspace 1"
  "mod+shift+2": "move workspace 2"
  "mod+shift+3": "move workspace 3"
  "mod+shift+4": "move workspace 4"
  "mod+shift+5": "move workspace 5"
  # relative switching, and i3's back_and_forth (bounce to the previous desktop):
  # "mod+rightbracket": "workspace next"
  # "mod+leftbracket": "workspace prev"
  # "mod+tab": "workspace back_and_forth"

  # runtime gaps tweaks (live until `gaps reset` or a config reload):
  # "mod+equal": "gaps inner +2"
  # "mod+minus": "gaps inner -2"
  # "mod+shift+g": "gaps reset"

  # launching
  "mod+return": "exec terminal"
  "mod+d": "exec launcher"

  # briarWM control
  "mod+shift+c": "reload"
  "mod+shift+r": "restart"
  "mod+shift+t": "dump tree"   # logs the focused display's tree

# Modal resize mode: mod+r enters; h/j/k/l expand the window toward that side; escape/return exits.
modes:
  resize:
    "h": "resize left 40"
    "j": "resize down 40"
    "k": "resize up 40"
    "l": "resize right 40"
    "escape": "mode default"
    "return": "mode default"

# Windows that should never be tiled.
floating:
  bundle_ids:
    - com.apple.systempreferences      # System Settings
    - com.apple.ActivityMonitor
    - com.apple.calculator
  title_regex:
    - "^Preferences$"
    - ".*Settings$"

# Per-app overrides (force-float apps that refuse resizing). A rule may match by
# bundle_id, title_regex, or both (both must match when both are given).
rules:
  - match: { bundle_id: "us.zoom.xos" }
    floating: true
  # - match: { bundle_id: "com.example.app", title_regex: "^Palette" }
  #   floating: true
