# briarWM configuration — ~/.config/briarWM/config.yaml
# Reloads automatically on save (also: $mod+Shift+c).

# $mod modifier: alt (recommended) | cmd | ctrl | shift | hyper
# Alt = i3's default. Note: bound Alt combos won't type special characters.
modifier: alt

gaps:
  inner: 10           # between windows
  outer: 6            # screen margin

# Visual focus cue: a soft glowing border that gives one quick bounce around the focused
# window on each focus switch. Purely cosmetic — never moves windows or affects tiling.
focus_indicator:
  enabled: true
  color: "#64D2FF"      # border accent — #RGB, #RRGGBB, or #RRGGBBAA (macOS systemTeal)
  border_width: 1.5     # stroke width of the border
  corner_radius: 6.0    # rounding of the border corners
  fade_in: 0.14         # border rise time, seconds (smooth swell)
  hold: 0.0             # peak plateau; 0 = swell straight into the fade
  fade_out: 0.30        # border fall time, seconds (soft trailing fade)
  opacity: 0.55         # peak opacity, 0–1 — lower is more subtle
  glow: 5.0             # soft same-color feather in points (0 = a crisp hard line)

layout:
  default_ratio: 0.5        # new split's share for the existing window (0–1)
  insert_at: after          # where a new window lands relative to the focused one
  auto_split: longer_edge   # longer_edge | horizontal | vertical
  focus_wraps_monitors: true
  move_follows_focus: false   # `move workspace N`: follow the window to that desktop?
  space_poll_interval: 1.5    # seconds; backstop sweep for drag-to-desktop. 0 disables.
                              # (takes effect on restart, not hot reload)
  manage_tabbed_windows: true # treat native macOS tabs (e.g. Ghostty) as one tile that
                              # follows the visible tab; false = one tile per tab window
  reflow_on_minimize: true    # minimizing a window reflows the rest to fill the space
                              # (restored on un-minimize); false leaves its slot empty
  # `cycle layout` steps through these presets, in order, wrapping around.
  # Presets: even-horizontal | even-vertical | main-vertical | main-horizontal | tiled
  preset_cycle: [even-horizontal, even-vertical, main-vertical, main-horizontal, tiled]
  main_ratio: 0.6             # main pane's screen fraction in the main-* presets

# Named commands for `exec`. Change these to your terminal / launcher.
exec:
  terminal: "open -a Terminal"
  launcher: "open -a Spotlight"

keybindings:
  # focus (vim h/j/k/l + arrows)
  "alt+h": "focus left"
  "alt+j": "focus down"
  "alt+k": "focus up"
  "alt+l": "focus right"
  "alt+left": "focus left"
  "alt+down": "focus down"
  "alt+up": "focus up"
  "alt+right": "focus right"

  # move / swap window
  "alt+shift+h": "move left"
  "alt+shift+j": "move down"
  "alt+shift+k": "move up"
  "alt+shift+l": "move right"

  # split preselection (bspwm-style) for the next window
  "alt+ctrl+h": "preselect horizontal"
  "alt+ctrl+v": "preselect vertical"
  "alt+e": "toggle split"

  # snap the whole desktop to the next preset layout (tmux Ctrl-b Space style);
  # order & main-pane width come from layout.preset_cycle / layout.main_ratio above
  "alt+t": "cycle layout"
  # or jump straight to one preset:
  # "alt+ctrl+t": "layout tiled"
  # "alt+ctrl+m": "layout main-vertical"

  # sizing — expands the focused window toward the named direction
  # (or shrinks it if that side is flush against the screen edge)
  "alt+ctrl+left": "resize left 40"
  "alt+ctrl+right": "resize right 40"
  "alt+ctrl+up": "resize up 40"
  "alt+ctrl+down": "resize down 40"
  "alt+shift+e": "balance"
  "alt+r": "mode resize"

  # window / layout
  "alt+f": "fullscreen"
  "alt+shift+space": "toggle float"
  "alt+space": "focus mode toggle"
  "alt+shift+q": "close"

  # desktops (macOS Spaces): switch to N, or send the focused window to N.
  # N is 1-based, left → right, among the user desktops of the focused display.
  "alt+1": "workspace 1"
  "alt+2": "workspace 2"
  "alt+3": "workspace 3"
  "alt+4": "workspace 4"
  "alt+5": "workspace 5"
  "alt+shift+1": "move workspace 1"
  "alt+shift+2": "move workspace 2"
  "alt+shift+3": "move workspace 3"
  "alt+shift+4": "move workspace 4"
  "alt+shift+5": "move workspace 5"
  # relative switching, and i3's back_and_forth (bounce to the previous desktop):
  # "alt+rightbracket": "workspace next"
  # "alt+leftbracket": "workspace prev"
  # "alt+tab": "workspace back_and_forth"

  # runtime gaps tweaks (live until `gaps reset` or a config reload):
  # "alt+equal": "gaps inner +2"
  # "alt+minus": "gaps inner -2"
  # "alt+shift+g": "gaps reset"

  # launching
  "alt+return": "exec terminal"
  "alt+d": "exec launcher"

  # briarWM control
  "alt+shift+c": "reload"
  "alt+shift+r": "restart"
  "alt+shift+t": "dump tree"   # logs the focused display's tree

# Modal resize mode: alt+r enters; h/j/k/l expand the window toward that side; escape/return exits.
modes:
  resize:
    "h": "resize left 40"
    "j": "resize down 40"
    "k": "resize up 40"
    "l": "resize right 40"
    "escape": "mode default"
    "return": "mode default"

# Windows that should never be tiled.
floating:
  bundle_ids:
    - com.apple.systempreferences      # System Settings
    - com.apple.ActivityMonitor
    - com.apple.calculator
  title_regex:
    - "^Preferences$"
    - ".*Settings$"

# Per-app overrides (force-float apps that refuse resizing). A rule may match by
# bundle_id, title_regex, or both (both must match when both are given).
rules:
  - match: { bundle_id: "us.zoom.xos" }
    floating: true
  # - match: { bundle_id: "com.example.app", title_regex: "^Palette" }
  #   floating: true
